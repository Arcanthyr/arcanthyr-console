name = "arcanthyr-api"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "public"
not_found_handling = "single-page-application"

[[d1_databases]]
binding = "DB"
database_name = "arcanthyr"
database_id = "1b8ca95d-b8b3-421d-8c77-20f80432e1a0"

[ai]
binding = "AI"

[browser]
binding = "BROWSER"

[[kv_namespaces]]
binding = "EMAIL_DIGEST"
id = "9ea5773d11ac40ce9904ca21c602e9f4"

[[queues.producers]]
binding = "CASE_QUEUE"
queue = "arcanthyr-case-processing"

[[queues.consumers]]
queue = "arcanthyr-case-processing"
max_batch_size = 1
max_batch_timeout = 0
max_retries = 5

[triggers]
crons = ["0 2 * * *", "0 3 * * *"]