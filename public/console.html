<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arcanthyr – Console</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Query-specific styles ──────────────────────────────── */
    .query-input {
      width: 100%;
      min-height: 80px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 0.875rem;
      font-weight: 300;
      line-height: 1.75;
      resize: vertical;
      transition: border-color var(--t);
    }
    .query-input::placeholder { color: rgba(255,255,255,0.5); font-style: italic; }
    .query-input:focus { outline: none; border-color: var(--blue); }

    .answer-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid rgba(58, 106, 154, 0.5);
      border-radius: var(--radius);
      padding: 20px 22px;
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 0.9375rem;
      color: var(--text);
      line-height: 1.9;
      white-space: pre-wrap;
    }
    .answer-block.loading {
      color: var(--text-dim);
      animation: pulse-dim 1.4s ease infinite;
    }

    .sources-list { display: flex; flex-direction: column; gap: 8px; }

    .source-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--border-heavy);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-left-color var(--t), border-color var(--t);
    }
    .source-item:hover { border-left-color: var(--blue); }
    .source-item.legislation { border-left-color: rgba(74, 138, 78, 0.4); }
    .source-item.legislation:hover { border-left-color: var(--green); }

    .source-citation {
      font-family: 'Times New Roman', Times, serif;
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .source-meta {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .source-summary {
      font-family: Georgia, 'Times New Roman', Times, serif;
      font-size: 0.875rem;
      color: var(--text-mid);
      line-height: 1.7;
      margin-top: 4px;
    }
    .source-actions { margin-top: 6px; }

    .score-badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      background: var(--blue-dim);
      color: var(--blue);
      border-radius: 3px;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      border: 1px solid rgba(58, 106, 154, 0.2);
    }

    .court-badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      background: var(--surface-raise);
      color: var(--text-dim);
      border-radius: 3px;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border-heavy);
    }
    .court-badge.cca, .court-badge.fullcourt {
      background: var(--blue-dim);
      color: var(--blue);
      border-color: rgba(58, 106, 154, 0.25);
    }
    .court-badge.legislation {
      background: var(--green-dim);
      color: var(--green);
      border-color: rgba(74, 138, 78, 0.25);
      text-transform: none;
      letter-spacing: 0.04em;
    }

    .model-badge {
      display: inline-flex;
      align-items: center;
      height: 16px;
      padding: 0 6px;
      background: var(--blue-dim);
      color: var(--blue);
      border-radius: 3px;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid rgba(58, 106, 154, 0.2);
    }

    .threshold-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .threshold-row label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    .threshold-row input[type="range"] {
      flex: 1;
      min-width: 120px;
      accent-color: var(--blue);
    }
    .threshold-val {
      font-size: 0.72rem;
      color: var(--text-mid);
      font-family: 'DM Mono', monospace;
      min-width: 36px;
    }

    .chunk-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    .expand-toggle {
      height: auto;
      padding: 2px 0;
      background: none;
      border: none;
      color: var(--blue);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.75;
    }
    .expand-toggle:hover {
      background: none;
      border: none;
      color: var(--blue);
      opacity: 1;
      transform: none;
      box-shadow: none;
    }

    .model-toggle {
      display: flex;
      border: 1px solid var(--border-heavy);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .model-toggle button {
      height: 32px;
      padding: 0 14px;
      font-size: 0.6875rem;
      border: none;
      border-radius: 0;
      background: transparent;
      color: var(--text-dim);
      letter-spacing: 0.06em;
    }
    .model-toggle button:hover {
      background: var(--surface-raise);
      color: var(--text-mid);
      transform: none;
      box-shadow: none;
      border-color: transparent;
    }
    .model-toggle button.active {
      background: var(--surface-raise);
      color: var(--blue);
    }
    .model-toggle button:first-child { border-right: 1px solid var(--border-heavy); }
  </style>
</head>

<body>
  <nav class="site-nav">
    <a href="index.html" aria-label="Home">
      <img src="sigil.jpg" alt="Arcanthyr" class="sigil-nav" />
    </a>
    <a class="btn ghost small" href="index.html">Home</a>
    <a class="btn ghost small" href="legal.html">Legal</a>
    <a class="btn ghost small" href="ingest.html">Upload</a>
    <a class="btn ghost small" href="axiom-relay.html">Axiom Relay</a>
  </nav>

  <main class="wrap">
    <header class="header">
      <h1>Arc Console</h1>
      <p class="sub">Search. Reason. Synthesise.</p>
    </header>

    <hr class="divider" />

    <!-- SEARCH QUERY CARD -->
    <section class="card">
      <div class="row space">
        <span class="label">Legal Query</span>
        <span class="chunk-count" id="chunkCount"></span>
      </div>

      <textarea
        id="queryInput"
        class="query-input"
        placeholder="Ask a legal question — e.g. What is the standard for appellate intervention in sentencing?"
        rows="3"
      ></textarea>

      <div class="row space">
        <div class="row" style="gap:10px;">
          <button id="queryBtn" class="btn-primary">Ask</button>
          <button id="clearQueryBtn" class="ghost small">Clear</button>
        </div>
        <div class="model-toggle">
          <button id="modelWorkers" class="active" onclick="setModel('workers-ai')">Workers AI</button>
          <button id="modelClaude" onclick="setModel('claude')">Claude</button>
        </div>
      </div>
    </section>

    <!-- ANSWER CARD -->
    <section class="card" id="answerCard" style="display:none">
      <div class="row space">
        <span class="label">Answer</span>
        <div class="row" style="gap:8px;">
          <span class="model-badge" id="modelBadge" style="display:none"></span>
          <span class="chunk-count" id="answerMeta"></span>
        </div>
      </div>
      <div id="answerBlock" class="answer-block"></div>
    </section>

    <!-- SOURCES CARD -->
    <section class="card" id="sourcesCard" style="display:none">
      <span class="label">Sources Retrieved</span>
      <div id="sourcesList" class="sources-list"></div>
    </section>

    <footer class="footer">
      <small>Arcanthyr Console — Private. Iterative.</small>
    </footer>
  </main>

  <div id="saveToast" style="display:none" aria-live="polite"></div>

  <script src="app.js?v=12"></script>
  <script>
    /* ── Search functionality ─────────────────────────────────── */
    const queryInput      = document.getElementById('queryInput');
    const queryBtn        = document.getElementById('queryBtn');
    const clearQueryBtn   = document.getElementById('clearQueryBtn');
    const answerCard      = document.getElementById('answerCard');
    const answerBlock     = document.getElementById('answerBlock');
    const answerMeta      = document.getElementById('answerMeta');
    const modelBadge      = document.getElementById('modelBadge');
    const sourcesCard     = document.getElementById('sourcesCard');
    const sourcesList     = document.getElementById('sourcesList');
    const chunkCount      = document.getElementById('chunkCount');

    queryInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) runQuery();
    });

    let activeModel = 'workers-ai';
    const endpoints = {
      'workers-ai': '/api/legal/legal-query-workers-ai',
      'claude':     '/api/legal/legal-query',
    };

    function setModel(m) {
      activeModel = m;
      document.getElementById('modelWorkers').classList.toggle('active', m === 'workers-ai');
      document.getElementById('modelClaude').classList.toggle('active', m === 'claude');
    }

    queryBtn.addEventListener('click', runQuery);
    clearQueryBtn.addEventListener('click', () => {
      queryInput.value = '';
      answerCard.style.display = 'none';
      sourcesCard.style.display = 'none';
      chunkCount.textContent = '';
      queryInput.focus();
    });

    function renderMarkdown(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    function courtLabel(court) {
      const map = { cca: 'CCA', fullcourt: 'Full Court', supreme: 'Supreme',
                    magistrates: 'Magistrates', legislation: 'Legislation' };
      return map[court] || (court ? court.toUpperCase() : 'Unknown');
    }

    function renderSource(s) {
      const isLeg = s.court === 'legislation';
      const cClass = s.court || 'unknown';
      const score = (s.score != null && s.score < 1)
        ? `<span class="score-badge">score ${Number(s.score).toFixed(3)}</span>` : '';

      let summaryHtml = '';
      if (s.summary) {
        const SHORT = 600;
        if (s.summary.length <= SHORT) {
          summaryHtml = `<div class="source-summary">${s.summary}</div>`;
        } else {
          summaryHtml = `<div class="source-summary">
            <span class="s-preview">${s.summary.substring(0, SHORT)}</span><span class="s-ellipsis">…</span><span class="s-rest" style="display:none">${s.summary.substring(SHORT)}</span>
            <button class="expand-toggle" onclick="toggleSummary(this)">Show more</button>
          </div>`;
        }
      }

      const viewBtn = isLeg
        ? `<div class="source-actions">
             <a class="btn ghost small" href="legal.html#legislation=${encodeURIComponent(s.citation)}" target="_blank">View</a>
           </div>`
        : `<div class="source-actions">
             <a class="btn ghost small" href="legal.html#citation=${encodeURIComponent(s.citation)}" target="_blank">View Case</a>
           </div>`;

      return `<div class="source-item ${isLeg ? 'legislation' : 'has-link'}">
        <div class="row" style="gap:6px;flex-wrap:wrap;">
          <span class="source-citation">${s.citation}</span>
          <span class="court-badge ${cClass}">${courtLabel(s.court)}</span>
          ${score}
        </div>
        <div class="source-meta">${s.year ? `<span>${s.year}</span>` : ''}</div>
        ${summaryHtml}
        ${viewBtn}
      </div>`;
    }

    function toggleSummary(btn) {
      const wrap = btn.closest('.source-summary');
      const rest = wrap.querySelector('.s-rest');
      const ell  = wrap.querySelector('.s-ellipsis');
      const open = rest.style.display !== 'none';
      rest.style.display = open ? 'none' : 'inline';
      ell.style.display  = open ? 'inline' : 'none';
      btn.textContent    = open ? 'Show more' : 'Show less';
    }

    async function runQuery() {
      const query = queryInput.value.trim();
      if (!query) { queryInput.focus(); return; }

      const threshold = 0.45;

      queryBtn.disabled = true;
      queryBtn.textContent = 'Searching…';
      answerCard.style.display = 'block';
      answerBlock.className = 'answer-block loading';
      answerBlock.textContent = 'Retrieving relevant cases and generating answer…';
      modelBadge.style.display = 'none';
      sourcesCard.style.display = 'none';
      chunkCount.textContent = '';

      try {
        const res = await fetch(endpoints[activeModel], {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, score_threshold: threshold })
        });

        const data = await res.json();
        const result = data.result || data;
        if (result.error) throw new Error(result.error);

        answerBlock.className = 'answer-block';
        answerBlock.innerHTML = renderMarkdown(result.answer || 'No answer returned.');
        answerMeta.textContent = `${result.chunk_count || 0} chunk${result.chunk_count !== 1 ? 's' : ''} retrieved`;

        if (result.model) {
          const labels = { claude: 'Claude', 'workers-ai': 'Workers AI', qwen: 'Qwen' };
          modelBadge.textContent = labels[result.model] || result.model;
          modelBadge.style.display = 'inline-flex';
        }

        const sources = result.sources || [];
        sourcesCard.style.display = sources.length > 0 ? 'block' : 'none';
        if (sources.length > 0) sourcesList.innerHTML = sources.map(renderSource).join('');

        chunkCount.textContent = sources.length > 0
          ? `${sources.length} source${sources.length !== 1 ? 's' : ''} cited` : '';

      } catch (err) {
        answerBlock.className = 'answer-block';
        answerBlock.textContent = `Error: ${err.message}`;
        answerMeta.textContent = '';
        modelBadge.style.display = 'none';
      } finally {
        queryBtn.disabled = false;
        queryBtn.textContent = 'Ask';
      }
    }
  </script>
</body>

</html>
