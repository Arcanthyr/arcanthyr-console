<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Arcanthyr – Axiom Relay</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <nav class="site-nav">
    <a href="index.html" aria-label="Home">
      <img src="sigil.jpg" alt="Arcanthyr" class="sigil-nav" />
    </a>
    <a class="btn ghost small" href="index.html">Home</a>
    <a class="btn ghost small" href="console.html">Arc Console</a>
    <a class="btn ghost small" href="legal.html">Legal</a>
    <a class="btn ghost small" href="ingest.html">Ingest</a>
  </nav>

  <main class="wrap">
    <header class="header">
      <h1>Axiom Relay</h1>
      <p class="sub">Compose and send. Manage contacts.</p>
    </header>

    <hr class="divider" />

    <!-- COMPOSE CARD -->
    <section class="card">
      <div class="row space">
        <h2 class="h2">Compose</h2>
      </div>

      <!-- emailCompose is always visible on this page -->
      <div id="emailCompose">
        <label class="label">Recipients</label>
        <div class="row" style="margin-top:6px;">
          <input type="text" id="emailRecipients" class="search-input"
            placeholder="email@example.com (comma separated)" style="flex:1" />
          <button id="addFromContactsBtn" class="btn ghost small">From Contacts</button>
        </div>

        <label class="label" style="margin-top:16px;">Subject</label>
        <input type="text" id="emailSubject" class="search-input" style="margin-top:6px;"
          placeholder="Email subject…" />

        <label class="label" style="margin-top:16px;">Message</label>
        <textarea id="emailBody" class="textarea" style="margin-top:6px;min-height:160px;"
          placeholder="Compose message…"></textarea>

        <div class="row" style="margin-top:16px;">
          <button id="sendEmailBtn" class="btn btn-primary">Send Email</button>
          <button id="clearEmailFieldsBtn" class="btn ghost small">Clear</button>
        </div>
        <div id="emailOutput" class="output" style="margin-top:12px;display:none;"></div>
      </div>
    </section>

    <!-- CONTACTS CARD -->
    <section class="card">
      <div class="row space">
        <h2 class="h2">Contacts</h2>
      </div>

      <div class="row" style="margin-top:4px;">
        <input type="text" id="newContactName" class="search-input" placeholder="Name" style="flex:1" />
        <input type="email" id="newContactEmail" class="search-input" placeholder="Email" style="flex:1" />
        <button id="addContactBtn" class="btn small">Add</button>
      </div>

      <ul id="contactsList" class="contacts-list"></ul>
    </section>

    <footer class="footer">
      <small>Arcanthyr — Axiom Relay</small>
    </footer>
  </main>

  <!-- Hidden dummy for contactsModal — prevents null reference in app.js renderContactsList -->
  <div id="contactsModal" style="display:none"></div>

  <div id="saveToast" style="display:none" aria-live="polite"></div>

  <script src="app.js?v=12"></script>
  <script>
    /* ── Axiom Relay page overrides ───────────────────────────── */

    // Load contacts on page load (app.js only does this if manageContactsBtn exists)
    window.addEventListener('load', async () => {
      try {
        contacts = await emailGetContacts();
        renderContactsList();
      } catch (e) {
        console.error('Failed to load contacts:', e);
      }
    });

    // Clear fields button
    document.getElementById('clearEmailFieldsBtn')?.addEventListener('click', () => {
      document.getElementById('emailRecipients').value = '';
      document.getElementById('emailSubject').value = '';
      document.getElementById('emailBody').value = '';
      const out = document.getElementById('emailOutput');
      out.textContent = '';
      out.style.display = 'none';
    });

    // "From Contacts" scrolls to contacts section
    document.getElementById('addFromContactsBtn')?.addEventListener('click', () => {
      document.querySelector('.card:last-of-type')?.scrollIntoView({ behavior: 'smooth' });
    });

    // Show emailOutput on sendEmailBtn activity
    const _origSendBtn = document.getElementById('sendEmailBtn');
    if (_origSendBtn) {
      _origSendBtn.addEventListener('click', () => {
        const out = document.getElementById('emailOutput');
        out.style.display = 'block';
      }, true); // capture phase so it fires before app.js handler reads display state
    }
  </script>
</body>

</html>
